<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Smart Cane — UNO Q dashboard</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #0e1116; color: #e6edf3; }
  header { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-bottom: 1px solid #222; }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  #badge { padding: 4px 12px; border-radius: 999px; font-size: 13px; font-weight: 600; background: #30363d; }
  #badge.live { background: #1f6f3d; }
  #badge.down { background: #8a1f1f; }
  .wrap { padding: 20px; display: grid; gap: 18px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); max-width: 1100px; }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 16px; }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: #8b949e; margin: 0 0 12px; }
  .vals { display: grid; grid-template-columns: auto 1fr; gap: 4px 14px; font-variant-numeric: tabular-nums; font-size: 15px; }
  .vals span:nth-child(odd) { color: #8b949e; }
  .vals span:nth-child(even) { text-align: right; }
  .big { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; }
  #phase { display: inline-block; margin-top: 8px; padding: 6px 14px; border-radius: 8px; font-weight: 700; font-size: 15px; }
  canvas { width: 100%; height: 120px; display: block; }
  .meta { color: #8b949e; font-size: 12px; margin-top: 6px; }
  .p0 { background:#6e7681; } .p1 { background:#1f6f3d; } .p2 { background:#9a6700; } .p3 { background:#1f6feb; }
</style>
</head>
<body>
<header>
  <h1>🦯 Smart Cane — UNO Q</h1>
  <span id="badge">connecting…</span>
  <span class="meta" id="meta"></span>
</header>

<div class="wrap">
  <div class="card">
    <h2>Phase</h2>
    <div id="phase" class="p0">—</div>
    <div class="meta">acc_norm <span class="big" id="accN">—</span> &nbsp; gyro_norm <span class="big" id="gyroN">—</span></div>
  </div>

  <div class="card">
    <h2>Accelerometer (m/s²)</h2>
    <div class="vals">
      <span>ax</span><span id="ax">—</span>
      <span>ay</span><span id="ay">—</span>
      <span>az</span><span id="az">—</span>
    </div>
  </div>

  <div class="card">
    <h2>Gyroscope (deg/s)</h2>
    <div class="vals">
      <span>gx</span><span id="gx">—</span>
      <span>gy</span><span id="gy">—</span>
      <span>gz</span><span id="gz">—</span>
    </div>
  </div>

  <div class="card" style="grid-column: 1 / -1;">
    <h2>acc_norm</h2>
    <canvas id="cAcc"></canvas>
  </div>
  <div class="card" style="grid-column: 1 / -1;">
    <h2>gyro_norm</h2>
    <canvas id="cGyro"></canvas>
  </div>
</div>

<script>
const POLL_MS = __POLL_MS__;
const PHASE_NAMES = {0:"UNKNOWN",1:"STATIONARY / ZERO-VEL",2:"GROUND CONTACT + ROTATION",3:"SWING / ON-AIR"};

function fmt(v, d=3) { return (v===null||v===undefined) ? "—" : Number(v).toFixed(d); }

// Minimal self-contained line chart on a canvas (no external libs).
function drawChart(canvas, data, color, baseline=null) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);
  if (!data || data.length < 2) return;

  let lo = Math.min(...data), hi = Math.max(...data);
  if (baseline !== null) { lo = Math.min(lo, baseline); hi = Math.max(hi, baseline); }
  if (hi - lo < 1e-6) { hi += 1; lo -= 1; }
  const pad = (hi - lo) * 0.1; lo -= pad; hi += pad;
  const x = i => (i / (data.length - 1)) * w;
  const y = v => h - ((v - lo) / (hi - lo)) * h;

  if (baseline !== null) {
    ctx.strokeStyle = "#30363d"; ctx.setLineDash([4, 4]); ctx.beginPath();
    ctx.moveTo(0, y(baseline)); ctx.lineTo(w, y(baseline)); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
  data.forEach((v, i) => i ? ctx.lineTo(x(i), y(v)) : ctx.moveTo(x(i), y(v)));
  ctx.stroke();
}

async function tick() {
  try {
    const r = await fetch("/api/state", { cache: "no-store" });
    const s = await r.json();

    const badge = document.getElementById("badge");
    const live = s.live;
    badge.textContent = (s.status || "?") + (live ? " · live" : "");
    badge.className = s.status === "MOCK" ? "live" : (live ? "live" : "down");

    document.getElementById("meta").textContent =
      `samples: ${s.count}` + (s.age_s !== null ? ` · last ${s.age_s}s ago` : "");

    const L = s.latest;
    if (L) {
      for (const k of ["ax","ay","az","gx","gy","gz"]) document.getElementById(k).textContent = fmt(L[k]);
      document.getElementById("accN").textContent = fmt(L.acc_norm, 2);
      document.getElementById("gyroN").textContent = fmt(L.gyro_norm, 2);
      const ph = document.getElementById("phase");
      ph.textContent = PHASE_NAMES[L.phase] ?? "—";
      ph.className = "p" + L.phase;
    }
    if (s.recent) {
      drawChart(document.getElementById("cAcc"), s.recent.acc_norm, "#58a6ff", 9.80665);
      drawChart(document.getElementById("cGyro"), s.recent.gyro_norm, "#f0883e");
    }
  } catch (e) {
    const badge = document.getElementById("badge");
    badge.textContent = "server unreachable"; badge.className = "down";
  }
}
setInterval(tick, POLL_MS);
tick();
</script>
</body>
</html>
