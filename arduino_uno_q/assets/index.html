<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Cane — UNO Q IMU</title>

  <!-- Vendored Tailwind (offline, no CDN). Rebuild with tools/tailwind/build.sh after
       adding new Tailwind classes to this file or app.js. -->
  <link rel="stylesheet" href="tailwind.css" />
</head>
<body class="bg-[#0e1116] text-[#e6edf3] font-sans min-h-screen">
  <header class="flex items-center gap-4 px-5 py-3 border-b border-[#222]">
    <h1 class="text-lg font-semibold m-0">🦯 Smart Cane — UNO Q</h1>
    <span id="badge" class="px-3 py-1 rounded-full text-[13px] font-semibold bg-[#30363d]">connecting…</span>
    <span id="meta" class="text-xs text-[#8b949e]"></span>
    <span class="flex-1"></span>
    <button id="btnClear" class="bg-[#21262d] hover:bg-[#30363d] border border-[#30363d] rounded-lg px-3 py-1.5 text-[13px]">Clear</button>
    <button id="btnExport" class="bg-[#21262d] hover:bg-[#30363d] border border-[#30363d] rounded-lg px-3 py-1.5 text-[13px]">Export CSV</button>
  </header>

  <main class="p-5 grid gap-[18px] max-w-[1100px] [grid-template-columns:repeat(auto-fit,minmax(280px,1fr))]">
    <section class="bg-[#161b22] border border-[#21262d] rounded-xl p-4 col-span-full">
      <h2 class="text-[13px] uppercase tracking-wider text-[#8b949e] mb-3">Source</h2>
      <div class="flex flex-wrap items-center gap-2">
        <button id="srcMock" class="rounded-lg px-3 py-1.5 text-[13px] border border-[#30363d]">Mock</button>
        <button id="srcBle"  class="rounded-lg px-3 py-1.5 text-[13px] border border-[#30363d]">BLE</button>
        <span class="w-px h-5 bg-[#30363d] mx-1"></span>
        <button id="btnScan" class="bg-[#21262d] hover:bg-[#30363d] border border-[#30363d] rounded-lg px-3 py-1.5 text-[13px] disabled:opacity-40" disabled>Scan</button>
        <select id="devSel" class="bg-[#0e1116] border border-[#30363d] rounded-lg px-2 py-1.5 text-[13px] min-w-[220px] disabled:opacity-40" disabled>
          <option value="">— scan for devices —</option>
        </select>
        <button id="btnConnect" class="bg-[#1f6feb] hover:brightness-110 rounded-lg px-3 py-1.5 text-[13px] font-semibold disabled:opacity-40" disabled>Connect</button>
        <span id="srcHint" class="text-xs text-[#8b949e]"></span>
      </div>
    </section>

    <section class="bg-[#161b22] border border-[#21262d] rounded-xl p-4">
      <h2 class="text-[13px] uppercase tracking-wider text-[#8b949e] mb-3">Phase</h2>
      <div id="phase" class="inline-block mt-1 px-3.5 py-1.5 rounded-lg font-bold text-[15px] bg-phase0">—</div>
      <div class="text-xs text-[#8b949e] mt-2">
        acc_norm <span class="text-[28px] font-bold tabular-nums" id="accN">—</span>
        &nbsp;&nbsp; gyro_norm <span class="text-[28px] font-bold tabular-nums" id="gyroN">—</span>
      </div>
    </section>

    <section class="bg-[#161b22] border border-[#21262d] rounded-xl p-4">
      <h2 class="text-[13px] uppercase tracking-wider text-[#8b949e] mb-3">Accelerometer (m/s²)</h2>
      <div class="grid grid-cols-[auto_1fr] gap-x-3.5 gap-y-1 text-[15px] tabular-nums">
        <span class="text-[#8b949e]">ax</span><span class="text-right" id="ax">—</span>
        <span class="text-[#8b949e]">ay</span><span class="text-right" id="ay">—</span>
        <span class="text-[#8b949e]">az</span><span class="text-right" id="az">—</span>
      </div>
    </section>

    <section class="bg-[#161b22] border border-[#21262d] rounded-xl p-4">
      <h2 class="text-[13px] uppercase tracking-wider text-[#8b949e] mb-3">Gyroscope (deg/s)</h2>
      <div class="grid grid-cols-[auto_1fr] gap-x-3.5 gap-y-1 text-[15px] tabular-nums">
        <span class="text-[#8b949e]">gx</span><span class="text-right" id="gx">—</span>
        <span class="text-[#8b949e]">gy</span><span class="text-right" id="gy">—</span>
        <span class="text-[#8b949e]">gz</span><span class="text-right" id="gz">—</span>
      </div>
    </section>

    <section class="bg-[#161b22] border border-[#21262d] rounded-xl p-4 col-span-full">
      <h2 class="text-[13px] uppercase tracking-wider text-[#8b949e] mb-3">acc_norm</h2>
      <canvas id="cAcc" class="w-full h-28 block"></canvas>
    </section>
    <section class="bg-[#161b22] border border-[#21262d] rounded-xl p-4 col-span-full">
      <h2 class="text-[13px] uppercase tracking-wider text-[#8b949e] mb-3">gyro_norm</h2>
      <canvas id="cGyro" class="w-full h-28 block"></canvas>
    </section>
    <section class="bg-[#161b22] border border-[#21262d] rounded-xl p-4 col-span-full">
      <h2 class="text-[13px] uppercase tracking-wider text-[#8b949e] mb-3">phase (0 unknown · 1 still · 2 ground+rot · 3 swing)</h2>
      <canvas id="cPhase" class="w-full h-28 block"></canvas>
    </section>
  </main>

  <!-- Pure REST polling (no Socket.IO) — app.js polls /api/* on the WebUI brick. -->
  <script src="app.js"></script>
</body>
</html>
